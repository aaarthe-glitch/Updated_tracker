<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<meta name="theme-color" content="#2C2C2A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Learning Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1EFE8;min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px}
button{border:none;cursor:pointer;font-family:inherit}

/* ── SCREENS ── */
.screen{display:none;padding:16px}
.screen.active{display:block}

/* ── PROFILE SELECT ── */
.profile-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:20px}
.profile-screen h1{font-size:22px;font-weight:700;color:#2C2C2A;text-align:center}
.profile-screen p{font-size:14px;color:#888780;text-align:center}
.profile-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.profile-card{background:#FFFFFF;border-radius:20px;border:2px solid #E8E6E0;padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s}
.profile-card:active{transform:scale(0.97)}
.profile-card.akshay{border-color:#AFA9EC}
.profile-card.thanu{border-color:#ED93B1}
.avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700}
.av-akshay{background:#EEEDFE;color:#534AB7}
.av-thanu{background:#FBEAF0;color:#993556}
.profile-name{font-size:16px;font-weight:600;color:#2C2C2A}
.profile-grade{font-size:12px;color:#888780}
.profile-pts{font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px}
.pts-akshay{background:#EEEDFE;color:#534AB7}
.pts-thanu{background:#FBEAF0;color:#993556}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#FFFFFF;border-top:1px solid #E8E6E0;display:flex;z-index:100}
.nav-btn{flex:1;padding:12px 8px 16px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;color:#B4B2A9;font-size:10px;font-weight:500;transition:color 0.15s}
.nav-btn.active{color:#534AB7}
.nav-btn svg{width:22px;height:22px}

/* ── HEADER ── */
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.back-btn{width:36px;height:36px;border-radius:50%;background:#FFFFFF;border:1px solid #E8E6E0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.header-title{font-size:17px;font-weight:600;color:#2C2C2A}
.header-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}

/* ── TODAY SCREEN ── */
.points-banner{border-radius:16px;padding:16px 18px;margin-bottom:16px;display:flex;gap:0}
.pb-akshay{background:#534AB7}
.pb-thanu{background:#993556}
.pts-stat{flex:1;text-align:center}
.pts-stat-val{font-size:26px;font-weight:700;color:#FFFFFF}
.pts-stat-lbl{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}
.pts-divider{width:1px;background:rgba(255,255,255,0.2);margin:4px 0}

.day-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid #D3D1C7;background:#FFFFFF;font-size:13px;font-weight:500;color:#5F5E5A;cursor:pointer}
.day-tab.active-akshay{background:#534AB7;border-color:#534AB7;color:#FFFFFF}
.day-tab.active-thanu{background:#993556;border-color:#993556;color:#FFFFFF}

.section-lbl{font-size:11px;font-weight:600;color:#888780;letter-spacing:0.06em;text-transform:uppercase;margin:14px 0 8px}

.task-card{background:#FFFFFF;border-radius:14px;border:1.5px solid #E8E6E0;margin-bottom:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform 0.1s}
.task-card:active{transform:scale(0.98)}
.task-card.done{border-color:transparent}
.check{width:38px;height:38px;border-radius:50%;border:2px solid #D3D1C7;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:all 0.2s}
.task-card.done .check{border-color:transparent}
.check-inner{display:none;color:#fff;font-size:16px;font-weight:700}
.task-card.done .check-inner{display:block}
.ti{flex:1}
.ti-name{font-size:14px;font-weight:500;color:#2C2C2A;line-height:1.3}
.task-card.done .ti-name{color:#B4B2A9;text-decoration:line-through}
.ti-sub{font-size:12px;color:#B4B2A9;margin-top:2px}
.pts-tag{font-size:13px;font-weight:700;flex-shrink:0}

/* ── CHART SCREEN ── */
.week-selector{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ws-arrow{width:36px;height:36px;border-radius:50%;background:#FFFFFF;border:1px solid #E8E6E0;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.ws-label{font-size:15px;font-weight:600;color:#2C2C2A}
.chart-card{background:#FFFFFF;border-radius:16px;border:1px solid #E8E6E0;padding:20px 16px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:500;color:#888780;margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:140px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height 0.4s}
.bar-lbl{font-size:11px;color:#888780;font-weight:500}
.bar-val{font-size:11px;font-weight:600;color:#2C2C2A}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:#FFFFFF;border-radius:14px;border:1px solid #E8E6E0;padding:14px}
.stat-box-val{font-size:24px;font-weight:700;color:#2C2C2A}
.stat-box-lbl{font-size:12px;color:#888780;margin-top:3px}

.streak-row{display:flex;gap:6px;margin-bottom:16px}
.streak-dot{flex:1;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.sd-done-akshay{background:#534AB7;color:#FFFFFF}
.sd-done-thanu{background:#993556;color:#FFFFFF}
.sd-miss{background:#F1EFE8;color:#B4B2A9}
.sd-today{background:#FFFFFF;border:2px solid #534AB7;color:#534AB7}
.sd-today-thanu{background:#FFFFFF;border:2px solid #993556;color:#993556}

/* ── PROFILE SCREEN (in-app) ── */
.profile-info-card{background:#FFFFFF;border-radius:16px;border:1px solid #E8E6E0;padding:20px;margin-bottom:14px;display:flex;gap:14px;align-items:center}
.big-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0}
.profile-meta h2{font-size:17px;font-weight:600;color:#2C2C2A}
.profile-meta p{font-size:13px;color:#888780;margin-top:2px}
.all-time-pts{font-size:22px;font-weight:700;margin-top:6px}

.task-edit-card{background:#FFFFFF;border-radius:14px;border:1px solid #E8E6E0;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.te-info{display:flex;align-items:center;gap:10px}
.te-name{font-size:14px;font-weight:500;color:#2C2C2A}
.te-pts{font-size:12px;color:#888780}
.toggle{width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background 0.2s}
.toggle.on-akshay{background:#534AB7}
.toggle.on-thanu{background:#993556}
.toggle.off{background:#D3D1C7}
.toggle-thumb{position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;transition:left 0.2s}
.toggle.on-akshay .toggle-thumb,.toggle.on-thanu .toggle-thumb{left:21px}
.toggle.off .toggle-thumb{left:3px}

.switch-btn{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:600;border:2px solid #E8E6E0;background:#FFFFFF;color:#2C2C2A;margin-top:8px}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- PROFILE SELECT -->
<div class="screen active" id="screen-profiles" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px">
  <div style="text-align:center">
    <div style="font-size:36px;margin-bottom:12px">📚</div>
    <h1 style="font-size:22px;font-weight:700;color:#2C2C2A;margin-bottom:6px">Learning Tracker</h1>
    <p style="font-size:14px;color:#888780">Who is studying today?</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%">
    <div class="profile-card akshay" onclick="selectProfile('akshay')">
      <div class="avatar av-akshay">A</div>
      <div class="profile-name">Akshay</div>
      <div class="profile-grade">Grade 7 · IIT track</div>
      <div class="profile-pts pts-akshay" id="pp-akshay">0 pts</div>
    </div>
    <div class="profile-card thanu" onclick="selectProfile('thanu')">
      <div class="avatar av-thanu">T</div>
      <div class="profile-name">Thanu</div>
      <div class="profile-grade">Grade 4 · Marine bio</div>
      <div class="profile-pts pts-thanu" id="pp-thanu">0 pts</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">

  <!-- TODAY -->
  <div class="screen active" id="screen-today">
    <div class="app-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="header-title" id="today-title">Today</div>
      <div class="header-avatar" id="today-avatar"></div>
    </div>
    <div class="points-banner" id="pts-banner">
      <div class="pts-stat">
        <div class="pts-stat-val" id="pts-today-val">0</div>
        <div class="pts-stat-lbl">Today</div>
      </div>
      <div class="pts-divider"></div>
      <div class="pts-stat">
        <div class="pts-stat-val" id="pts-week-val">0</div>
        <div class="pts-stat-lbl">This week</div>
      </div>
      <div class="pts-divider"></div>
      <div class="pts-stat">
        <div class="pts-stat-val" id="pts-all-val">0</div>
        <div class="pts-stat-lbl">All time</div>
      </div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="section-lbl" id="tasks-label">Tasks</div>
    <div id="tasks-list"></div>
  </div>

  <!-- CHART -->
  <div class="screen" id="screen-chart">
    <div class="app-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="header-title">Progress</div>
      <div class="header-avatar" id="chart-avatar"></div>
    </div>
    <div class="week-selector">
      <button class="ws-arrow" onclick="changeChartWeek(-1)">‹</button>
      <div class="ws-label" id="chart-week-label"></div>
      <button class="ws-arrow" onclick="changeChartWeek(1)">›</button>
    </div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-box-val" id="stat-best">0</div>
        <div class="stat-box-lbl">Best day (pts)</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-val" id="stat-days">0/7</div>
        <div class="stat-box-lbl">Active days</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-val" id="stat-tasks">0</div>
        <div class="stat-box-lbl">Tasks done</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-val" id="stat-streak">0</div>
        <div class="stat-box-lbl">IMO streak</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Points per day</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div class="section-lbl">IMO streak this week</div>
    <div class="streak-row" id="streak-row"></div>
  </div>

  <!-- PROFILE IN-APP -->
  <div class="screen" id="screen-profile">
    <div class="app-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="header-title">Profile</div>
      <div class="header-avatar" id="prof-avatar"></div>
    </div>
    <div class="profile-info-card">
      <div class="big-avatar" id="prof-big-avatar"></div>
      <div class="profile-meta">
        <h2 id="prof-name"></h2>
        <p id="prof-grade"></p>
        <div class="all-time-pts" id="prof-alltime"></div>
      </div>
    </div>
    <div class="section-lbl">Active tasks</div>
    <div id="task-toggles"></div>
    <button class="switch-btn" onclick="goHome()">Switch profile</button>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="showScreen('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Today
    </button>
    <button class="nav-btn" id="nav-chart" onclick="showScreen('chart')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Progress
    </button>
    <button class="nav-btn" id="nav-profile" onclick="showScreen('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Profile
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROFILES = {
  akshay: { name:'Akshay', grade:'Grade 7 · IIT track', initials:'A', color:'#534AB7', lightBg:'#EEEDFE', textColor:'#3C3489' },
  thanu:  { name:'Thanu',  grade:'Grade 4 · Marine bio', initials:'T', color:'#993556', lightBg:'#FBEAF0', textColor:'#72243E' }
};

const TASKS_BY_PROFILE = {
  akshay: [
    { id:'udemy',  emoji:'📘', name:'Udemy video',         sub:'Morning 15–20 min video',        pts:2, weekend:false },
    { id:'tamil',  emoji:'🌸', name:'Tamil reading',       sub:'1 sentence or short story',       pts:1, weekend:false },
    { id:'hw',     emoji:'✏️', name:'School homework',     sub:'Done before IIT material',        pts:0, weekend:false },
    { id:'imo',    emoji:'🏆', name:'IMO — 10+ questions', sub:'Mandatory daily, keep streak',    pts:2, weekend:false },
    { id:'libby',  emoji:'📚', name:'Libby reading',       sub:'15+ min any book',                pts:1, weekend:false },
    { id:'topic',  emoji:'✅', name:'Topic closed',        sub:'Udemy + BFN + IXL all done',      pts:3, weekend:false },
  ],
  thanu: [
    { id:'gk',      emoji:'🌍', name:'GK practice',        sub:'Mixed topics — quiz or reading',  pts:2, weekend:false },
    { id:'sheet',   emoji:'📝', name:'Sheet task',         sub:'Mixed subject worksheet',          pts:2, weekend:false },
    { id:'tamil',   emoji:'🌸', name:'Tamil reading',      sub:'1 sentence or short story',        pts:1, weekend:false },
    { id:'hw',      emoji:'✏️', name:'School homework',    sub:'Done first, always',               pts:0, weekend:false },
    { id:'imo',     emoji:'🏆', name:'IMO — 10+ questions',sub:'Mandatory daily, keep streak',     pts:2, weekend:false },
    { id:'libby',   emoji:'📚', name:'Libby reading',      sub:'15+ min any book',                 pts:1, weekend:false },
    { id:'cuemath', emoji:'📐', name:'Cuemath workbook',   sub:'Weekend only — workbook practice', pts:3, weekend:true  },
  ],
};
const ALL_TASKS = [...new Map([...TASKS_BY_PROFILE.akshay, ...TASKS_BY_PROFILE.thanu].map(t => [t.id, t])).values()];

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const today = new Date();
const todayDow = today.getDay();
let currentProfile = null;
let selectedDayOffset = 0;
let chartWeekOffset = 0;

// ── STORAGE ──
function sk(profile, dateStr, taskId) { return `lt_${profile}_${dateStr}_${taskId}`; }
function dateStr(offsetFromToday) {
  const d = new Date(today); d.setDate(d.getDate() + offsetFromToday); return d.toISOString().slice(0,10);
}
function isDone(profile, dayOffset, taskId) {
  try { return localStorage.getItem(sk(profile, dateStr(dayOffset), taskId)) === '1'; } catch(e) { return false; }
}
function setDone(profile, dayOffset, taskId, val) {
  try {
    const key = sk(profile, dateStr(dayOffset), taskId);
    val ? localStorage.setItem(key,'1') : localStorage.removeItem(key);
  } catch(e) {}
}
function allTimeKey(profile) { return `lt_alltime_${profile}`; }
function getAllTime(profile) { try { return parseInt(localStorage.getItem(allTimeKey(profile))||'0'); } catch(e){return 0;} }
function addAllTime(profile, pts) { try { localStorage.setItem(allTimeKey(profile), getAllTime(profile)+pts); } catch(e){} }
function getProfileTasks(profile) { return TASKS_BY_PROFILE[profile] || []; }
function getActiveTasks(profile) {
  try {
    const s = localStorage.getItem(`lt_tasks_${profile}`);
    return s ? JSON.parse(s) : getProfileTasks(profile).map(t=>t.id);
  } catch(e) { return getProfileTasks(profile).map(t=>t.id); }
}
function setActiveTasks(profile, ids) {
  try { localStorage.setItem(`lt_tasks_${profile}`, JSON.stringify(ids)); } catch(e) {}
}
function isWeekend(dayOffset) {
  const dow = new Date(today.getTime() + dayOffset*86400000).getDay();
  return dow === 0 || dow === 6;
}

// offset = days from this week's Monday
function weekDayOffset(weekOffset, dow) {
  const mondayOffset = -(todayDow === 0 ? 6 : todayDow - 1);
  return mondayOffset + (weekOffset * 7) + dow;
}

function ptsForDay(profile, dayOffset) {
  return getProfileTasks(profile).filter(t => getActiveTasks(profile).includes(t.id))
    .reduce((s,t) => s + (isDone(profile,dayOffset,t.id) ? t.pts : 0), 0);
}

function ptsForWeek(profile, weekOffset=0) {
  let total = 0;
  for (let d = 0; d < 7; d++) total += ptsForDay(profile, weekDayOffset(weekOffset, d));
  return total;
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── PROFILE SELECT ──
function goHome() {
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('screen-profiles').style.display = 'flex';
  document.getElementById('screen-profiles').classList.add('active');
  updateProfilePoints();
}

function updateProfilePoints() {
  ['akshay','thanu'].forEach(p => {
    document.getElementById(`pp-${p}`).textContent = getAllTime(p) + ' pts';
  });
}

function selectProfile(profile) {
  currentProfile = profile;
  selectedDayOffset = 0;
  chartWeekOffset = 0;
  document.getElementById('screen-profiles').style.display = 'none';
  document.getElementById('screen-profiles').classList.remove('active');
  document.getElementById('main-app').style.display = 'block';
  showScreen('today');
}

// ── NAV ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${name}`)?.classList.add('active');
  if (name === 'today') renderToday();
  if (name === 'chart') renderChart();
  if (name === 'profile') renderProfileScreen();
}

// ── TODAY ──
function renderToday() {
  const p = currentProfile;
  const prof = PROFILES[p];
  document.getElementById('today-title').textContent = prof.name + "'s tasks";
  document.getElementById('today-avatar').textContent = prof.initials;
  document.getElementById('today-avatar').style.cssText = `background:${prof.lightBg};color:${prof.color};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700`;
  const banner = document.getElementById('pts-banner');
  banner.className = `points-banner pb-${p}`;
  document.getElementById('pts-today-val').textContent = ptsForDay(p, selectedDayOffset);
  document.getElementById('pts-week-val').textContent = ptsForWeek(p, 0);
  document.getElementById('pts-all-val').textContent = getAllTime(p);
  renderDayTabs();
  renderTaskList();
}

function renderDayTabs() {
  const p = currentProfile;
  const mondayOffset = -(todayDow === 0 ? 6 : todayDow - 1);
  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = '';
  for (let d = 0; d < 7; d++) {
    const offset = mondayOffset + d;
    const btn = document.createElement('button');
    btn.className = 'day-tab';
    const isToday = offset === 0;
    const label = DAYS[(todayDow + offset - (todayDow === 0 ? 0 : 0) + 7*4) % 7];
    const dayDow = (new Date(today).setDate(today.getDate()+offset), new Date(today.getTime() + offset*86400000).getDay());
    btn.textContent = isToday ? DAYS[dayDow] + ' ·' : DAYS[dayDow];
    if (offset === selectedDayOffset) btn.classList.add(`active-${p}`);
    btn.onclick = () => { selectedDayOffset = offset; renderToday(); };
    tabs.appendChild(btn);
  }
}

function renderTaskList() {
  const p = currentProfile;
  const prof = PROFILES[p];
  const activeTasks = getActiveTasks(p);
  const list = document.getElementById('tasks-list');
  list.innerHTML = '';
  const dayDow = new Date(today.getTime() + selectedDayOffset*86400000).getDay();
  document.getElementById('tasks-label').textContent =
    selectedDayOffset === 0 ? "Today's tasks" : DAYS[dayDow] + "'s tasks";

  const weekend = isWeekend(selectedDayOffset);
  getProfileTasks(p).filter(t => activeTasks.includes(t.id) && (!t.weekend || weekend)).forEach(task => {
    const done = isDone(p, selectedDayOffset, task.id);
    const card = document.createElement('div');
    card.className = 'task-card' + (done ? ' done' : '');
    if (done) card.style.background = prof.lightBg;
    card.innerHTML = `
      <div class="check" style="${done ? 'background:'+prof.color : ''}">
        <span class="check-inner">✓</span>
      </div>
      <div class="ti">
        <div class="ti-name">${task.emoji} ${task.name}</div>
        <div class="ti-sub">${task.sub}</div>
      </div>
      <div class="pts-tag" style="color:${prof.color}">${task.pts > 0 ? '+'+task.pts : '—'}</div>
    `;
    card.onclick = () => {
      const nowDone = !isDone(p, selectedDayOffset, task.id);
      setDone(p, selectedDayOffset, task.id, nowDone);
      if (nowDone && task.pts > 0) {
        addAllTime(p, task.pts);
        toast(`+${task.pts} pts! ${task.emoji}`);
      }
      renderToday();
    };
    list.appendChild(card);
  });
}

// ── CHART ──
let chartWeek = 0;
function changeChartWeek(dir) {
  chartWeekOffset += dir;
  if (chartWeekOffset > 0) chartWeekOffset = 0;
  renderChart();
}

function renderChart() {
  const p = currentProfile;
  const prof = PROFILES[p];
  document.getElementById('chart-avatar').textContent = prof.initials;
  document.getElementById('chart-avatar').style.cssText = `background:${prof.lightBg};color:${prof.color};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700`;

  const mondayOffset = -(todayDow === 0 ? 6 : todayDow - 1) + chartWeekOffset * 7;
  const weekStart = new Date(today.getTime() + mondayOffset * 86400000);
  const weekEnd = new Date(today.getTime() + (mondayOffset + 6) * 86400000);
  const fmt = d => d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  document.getElementById('chart-week-label').textContent = `${fmt(weekStart)} – ${fmt(weekEnd)}`;

  let dayPts = [], bestDay = 0, activeDays = 0, totalTasks = 0;
  for (let d = 0; d < 7; d++) {
    const offset = mondayOffset + d;
    const pts = ptsForDay(p, offset);
    dayPts.push(pts);
    if (pts > bestDay) bestDay = pts;
    if (pts > 0) activeDays++;
    totalTasks += getProfileTasks(p).filter(t => getActiveTasks(p).includes(t.id) && isDone(p, offset, t.id)).length;
  }

  document.getElementById('stat-best').textContent = bestDay;
  document.getElementById('stat-days').textContent = `${activeDays}/7`;
  document.getElementById('stat-tasks').textContent = totalTasks;

  // IMO streak
  let streak = 0;
  for (let i = 0; i >= -30; i--) {
    if (isDone(p, i, 'imo')) streak++;
    else break;
  }
  document.getElementById('stat-streak').textContent = streak + ' days';

  // Bar chart
  const maxPts = Math.max(...dayPts, 1);
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = '';
  const DNAMES = ['M','T','W','T','F','S','S'];
  dayPts.forEach((pts, d) => {
    const offset = mondayOffset + d;
    const isToday = offset === 0;
    const col = document.createElement('div');
    col.className = 'bar-col';
    const heightPct = Math.round((pts / maxPts) * 100);
    const barColor = isToday ? prof.color : (pts > 0 ? prof.lightBg.replace('FE','CC').replace('F0','D0') : '#E8E6E0');
    const textColor = isToday ? prof.color : (pts > 0 ? prof.textColor : '#B4B2A9');
    col.innerHTML = `
      <div class="bar-val" style="color:${textColor}">${pts||''}</div>
      <div class="bar-wrap"><div class="bar" style="height:${heightPct}%;background:${barColor}"></div></div>
      <div class="bar-lbl" style="color:${isToday?prof.color:'#888780'}">${DNAMES[d]}</div>
    `;
    chart.appendChild(col);
  });

  // Streak dots
  const streakRow = document.getElementById('streak-row');
  streakRow.innerHTML = '';
  for (let d = 0; d < 7; d++) {
    const offset = mondayOffset + d;
    const imoDone = isDone(p, offset, 'imo');
    const isToday = offset === 0;
    const dot = document.createElement('div');
    dot.className = 'streak-dot ' + (imoDone ? `sd-done-${p}` : isToday ? `sd-today${p==='thanu'?'-thanu':''}` : 'sd-miss');
    dot.textContent = DNAMES[d];
    streakRow.appendChild(dot);
  }
}

// ── PROFILE SCREEN ──
function renderProfileScreen() {
  const p = currentProfile;
  const prof = PROFILES[p];
  document.getElementById('prof-avatar').textContent = prof.initials;
  document.getElementById('prof-avatar').style.cssText = `background:${prof.lightBg};color:${prof.color};width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700`;
  document.getElementById('prof-big-avatar').textContent = prof.initials;
  document.getElementById('prof-big-avatar').style.cssText = `width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;background:${prof.lightBg};color:${prof.color}`;
  document.getElementById('prof-name').textContent = prof.name;
  document.getElementById('prof-grade').textContent = prof.grade;
  document.getElementById('prof-alltime').textContent = getAllTime(p) + ' pts total';
  document.getElementById('prof-alltime').style.color = prof.color;

  const activeTasks = getActiveTasks(p);
  const toggles = document.getElementById('task-toggles');
  toggles.innerHTML = '';
  getProfileTasks(p).forEach(task => {
    const active = activeTasks.includes(task.id);
    const card = document.createElement('div');
    card.className = 'task-edit-card';
    card.innerHTML = `
      <div class="te-info">
        <span style="font-size:18px">${task.emoji}</span>
        <div>
          <div class="te-name">${task.name}</div>
          <div class="te-pts">${task.pts > 0 ? '+'+task.pts+' pts' : 'no pts'}</div>
        </div>
      </div>
      <div class="toggle ${active ? 'on-'+p : 'off'}" id="tog-${task.id}" onclick="toggleTask('${task.id}')">
        <div class="toggle-thumb"></div>
      </div>
    `;
    toggles.appendChild(card);
  });
}

function toggleTask(taskId) {
  const p = currentProfile;
  const active = getActiveTasks(p);
  const idx = active.indexOf(taskId);
  if (idx >= 0) active.splice(idx, 1);
  else active.push(taskId);
  setActiveTasks(p, active);
  renderProfileScreen();
}

// ── PWA INSTALL ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// Init
updateProfilePoints();
</script>
